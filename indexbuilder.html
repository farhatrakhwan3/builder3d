<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Builder3D | Vision Pro</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-hover: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --accent: #56c1ff;
            --bg: #03040a;
        }

        body { margin: 0; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; }

        /* --- Top Navbar --- */
        #navbar {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 1200px; height: 64px;
            background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 32px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; z-index: 1000; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        .nav-actions { display: flex; gap: 12px; }
        .btn-glass { 
            background: var(--glass); border: 1px solid var(--glass-border); 
            color: #fff; padding: 10px 22px; border-radius: 20px; cursor: pointer; 
            font-size: 0.8rem; font-weight: 600; transition: 0.3s;
        }
        .btn-glass:hover { background: var(--glass-hover); border-color: rgba(255,255,255,0.3); }
        .btn-primary { background: #fff; color: #000; border: none; padding: 10px 24px; border-radius: 20px; cursor: pointer; font-weight: 700; font-size: 0.8rem; transition: 0.3s; }

        /* --- Tool Sidebar --- */
        #sidebar {
            position: absolute; top: 60%; left: 30px; transform: translateY(-50%);
            background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 15px; display: flex; flex-direction: column; gap: 10px; z-index: 1000;
        }

        .tool {
            width: 100px; padding: 12px 0; border-radius: 16px; border: 1px solid transparent;
            background: rgba(255,255,255,0.02); color: #aaa; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .tool:hover { background: var(--glass-hover); color: #fff; }
        .tool.active { background: var(--accent); color: #fff; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }
        .tool-icon { font-size: 1.1rem; margin-bottom: 4px;}

        /* --- Bottom Right Transform Panel --- */
        #transform-panel {
            position: absolute; bottom: 30px; right: 30px;
            background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 8px; display: flex; gap: 6px; z-index: 1000;
        }
        .t-btn { 
            background: transparent; border: none; color: #888; padding: 8px 10px; 
            border-radius: 16px; cursor: pointer; font-size: 0.75rem; font-weight: 700; transition: 0.3s;
        }
        .t-btn.active { background: #fff; color: #000; }

        /* --- HUD --- */
        #stats-hud {
            position: absolute; bottom: 30px; left: 30px;
            font-size: 0.65rem; color: #555; letter-spacing: 1.5px; font-weight: 600;
        }
        .stat-val { color: #fff; margin-right: 15px; }
    </style>
</head>
<body>

    <div id="navbar">
        <div class="logo">Builder<span>3D</span></div>
        <div class="nav-actions">
            <button class="btn-glass" id="clear-btn" style="color: #ff6b6b;">CLEAR ALL</button>
            <button class="btn-glass" id="del-btn">DELETE SELECTED</button>
            <button class="btn-primary" id="export-btn">EXPORT .OBJ</button>
        </div>
    </div>

    <div id="sidebar">
        <button class="tool active" data-type="wall"><div class="tool-icon"><span class="material-symbols-rounded">home</span></div></button>
        <button class="tool" data-type="floor"><div class="tool-icon"><span class="material-symbols-rounded">floor</span></div></button>
        <button class="tool" data-type="roof"><div class="tool-icon"><span class="material-symbols-rounded">roofing</span></div></button>
        <button class="tool" data-type="glass"><div class="tool-icon"><span class="material-symbols-rounded">window</span></div></button>
        <button class="tool" data-type="door"><div class="tool-icon"><span class="material-symbols-rounded">sensor_door</span></div></button>
    </div>

    <div id="transform-panel">
        <button class="t-btn active" data-mode="translate">MOVE</button>
        <button class="t-btn" data-mode="rotate">ROTATE</button>
        <button class="t-btn" data-mode="scale">SCALE</button>
    </div>

    <div id="stats-hud">
        MATERIALS USED <span class="stat-val" id="st-obj">0</span> 
        COORD <span class="stat-val" id="st-pos">0,0,0</span>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';
        import { OBJExporter } from 'three/addons/exporters/OBJExporter.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x03040a);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(18, 15, 18);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const buildBase = new THREE.Group();
        scene.add(buildBase);

        const grid = new THREE.GridHelper(60, 60, 0x1a1c2e, 0x0a0c1a);
        scene.add(grid);

        const ambient = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambient);
        
        const pointLight = new THREE.PointLight(0x6366f1, 500, 100);
        pointLight.position.set(15, 25, 15);
        pointLight.castShadow = true;
        scene.add(pointLight);

        const orbit = new OrbitControls(camera, renderer.domElement);
        orbit.enableDamping = true;
        
        const transform = new TransformControls(camera, renderer.domElement);
        transform.addEventListener('dragging-changed', e => orbit.enabled = !e.value);
        scene.add(transform);

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        let currentType = 'wall';
        const mats = {
            wall: new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2 }),
            floor: new THREE.MeshStandardMaterial({ color: 0x1a1c2e, metalness: 0.5, roughness: 0.1 }),
            roof: new THREE.MeshStandardMaterial({ color: 0x6366f1 }),
            glass: new THREE.MeshPhysicalMaterial({ color: 0xffffff, transmission: 0.95, thickness: 0.1, roughness: 0 }),
            door: new THREE.MeshStandardMaterial({ color: 0x111111 })
        };

        // --- ONE TIME CLICK FUNCTION ---
        function spawnOne(type, pos) {
            let geo;
            if (type === 'floor') geo = new THREE.BoxGeometry(4, 0.15, 4);
            else if (type === 'roof') geo = new THREE.CylinderGeometry(0, 3, 2, 4).rotateY(Math.PI/4);
            else if (type === 'door') geo = new THREE.BoxGeometry(1.5, 3, 0.3);
            else geo = new THREE.BoxGeometry(4, 3, 0.4); 
            
            const m = new THREE.Mesh(geo, mats[type]);
            m.castShadow = m.receiveShadow = true;
            m.userData.type = type;

            const box = new THREE.Box3().setFromObject(m);
            const height = box.max.y - box.min.y;
            m.position.set(Math.round(pos.x), height/2, Math.round(pos.z));
            
            buildBase.add(m);
            updateCount();
            return m;
        }

        function updateCount() {
            document.getElementById('st-obj').innerText = buildBase.children.length;
        }

        window.addEventListener('mousedown', e => {
            if(e.target.tagName !== 'CANVAS' || transform.dragging) return;
            
            mouse.x = (e.clientX/window.innerWidth)*2-1;
            mouse.y = -(e.clientY/window.innerHeight)*2+1;
            raycaster.setFromCamera(mouse, camera);

            const hits = raycaster.intersectObjects(buildBase.children);
            if(hits.length > 0) {
                transform.attach(hits[0].object);
            } else {
                const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
                const target = new THREE.Vector3();
                if (raycaster.ray.intersectPlane(plane, target)) {
                    // Execute One-Time Placement
                    const newObj = spawnOne(currentType, target);
                    transform.attach(newObj);
                }
            }
        });

        // --- UI Logic ---
        document.querySelectorAll('.tool[data-type]').forEach(b => b.onclick = () => {
            document.querySelectorAll('.tool').forEach(t => t.classList.remove('active'));
            b.classList.add('active');
            currentType = b.dataset.type;
        });

        document.querySelectorAll('.t-btn').forEach(b => b.onclick = () => {
            document.querySelectorAll('.t-btn').forEach(t => t.classList.remove('active'));
            b.classList.add('active');
            transform.setMode(b.dataset.mode);
        });

        document.getElementById('del-btn').onclick = () => {
            if(transform.object) {
                buildBase.remove(transform.object);
                transform.detach();
                updateCount();
            }
        };

        document.getElementById('clear-btn').onclick = () => {
            while(buildBase.children.length > 0) buildBase.remove(buildBase.children[0]);
            transform.detach();
            updateCount();
        };

        document.getElementById('export-btn').onclick = () => {
            const blob = new Blob([new OBJExporter().parse(buildBase)], {type:'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'Builder3D_Project.obj';
            a.click();
        };

        function animate() {
            requestAnimationFrame(animate);
            orbit.update();
            document.getElementById('st-pos').innerText = `${Math.round(camera.position.x)},${Math.round(camera.position.z)}`;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
